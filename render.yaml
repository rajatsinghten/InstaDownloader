services:
  - type: web
    name: instadownloader-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SESSIONID
        sync: false
      - key: CSRFTOKEN
        sync: false
      - key: DS_USER_ID
        sync: false
